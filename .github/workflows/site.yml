name: site

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  check:
    name: check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Keep in sync with site/.tool-versions
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Keep in sync with site/.tool-versions
          node-version: 26.2.0
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: deploy (${{ github.event_name == 'pull_request' && 'preview' || 'production' }})
    needs: check
    runs-on: ubuntu-latest
    # Skip if required secrets are not configured yet (allows PRs to pass before initial setup)
    if: vars.CLOUDFLARE_PAGES_ENABLED == 'true'
    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=aidd-tokyo --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
